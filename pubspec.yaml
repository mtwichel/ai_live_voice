name: ai_live_voice
description: Flutter package for real-time AI voice conversations via Gemini Live (mic, speaker, barge-in).
version: 1.0.0+-dev.1

repository: https://github.com/mtwichel/ai_live_voice
issue_tracker: https://github.com/mtwichel/ai_live_voice/issues
homepage: https://github.com/mtwichel/ai_live_voice#readme

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_soloud: ^4.0.3
  logging: ^1.3.0
  meta: ^1.17.0
  permission_handler: ^12.0.1
  record: ^6.2.0
  web_socket: ^1.0.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
